name: Build wheel

on: [ workflow_dispatch ]

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build wheel
        run: uv build --wheel
      - uses: actions/upload-artifact@v3
        with:
          path: dist/*.whl